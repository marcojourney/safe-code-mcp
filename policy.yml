repoRoot: "."

allow:
  # Application source and tests
  - "src/**"
  - "tests/**"
  - "test/**"
  - "__tests__/**"

  # Architecture, API, and operational documentation
  - "docs/**"
  - "adr/**"
  - "openapi/**"
  - "api/**"

  # Safe project metadata and build configuration
  - "package.json"
  - "package-lock.json"
  - "tsconfig*.json"
  - "nest-cli.json"
  - "README.md"
  - "CHANGELOG.md"
  - "LICENSE"
  - ".editorconfig"
  - ".eslintrc*"
  - ".prettierrc*"

  # Non-secret local development and deployment templates
  - "Dockerfile"
  - "docker-compose*.yml"
  - "docker-compose*.yaml"
  - "k8s/**"
  - "helm/**"
  - "deploy/**"
  - "terraform/**/*.tf"
  - "infra/**/*.tf"
  - "config/**/*.example.*"
  - "config/**/*.template.*"

deny:
  # Version control, dependencies, generated output, and caches
  - ".git/**"
  - "node_modules/**"
  - "dist/**"
  - "build/**"
  - "coverage/**"
  - ".next/**"
  - ".turbo/**"
  - ".cache/**"
  - "tmp/**"
  - "temp/**"
  - ".DS_Store"
  - "**/.DS_Store"
  - "Thumbs.db"
  - "**/Thumbs.db"

  # Environment files and secret material
  - ".env*"
  - "**/.env*"
  - "**/*secret*"
  - "**/*credential*"
  - "**/*password*"
  - "**/*token*"
  - "**/*apikey*"
  - "**/*api-key*"
  - "**/*.pem"
  - "**/*.key"
  - "**/*.p12"
  - "**/*.pfx"
  - "**/*.jks"
  - "**/*.keystore"
  - "**/*.crt"
  - "**/*.cer"
  - "**/*.csr"
  - "**/*.asc"
  - "**/*.gpg"
  - "**/*.kdbx"
  - "secrets/**"
  - "credentials/**"

  # Production banking configuration should be reviewed through controlled channels
  - "**/application-prod.*"
  - "**/application-production.*"
  - "**/bootstrap-prod.*"
  - "**/bootstrap-production.*"
  - "**/values-prod.*"
  - "**/values-production.*"
  - "**/prod/**"
  - "**/production/**"

  # Data exports, database artifacts, logs, and audit evidence
  - "dumps/**"
  - "backups/**"
  - "exports/**"
  - "reports/**"
  - "evidence/**"
  - "audit/**"
  - "logs/**"
  - "**/*.log"
  - "**/*.sql"
  - "**/*.dump"
  - "**/*.bak"
  - "**/*.backup"
  - "**/*.csv"
  - "**/*.tsv"
  - "**/*.xlsx"
  - "**/*.xls"
  - "**/*.parquet"
  - "**/*.avro"

  # Infrastructure state and cloud credentials
  - "**/*.tfstate"
  - "**/*.tfstate.*"
  - ".terraform/**"
  - "**/.terraform/**"
  - ".aws/**"
  - ".azure/**"
  - ".gcp/**"
  - "**/service-account*.json"
  - "**/*service_account*.json"
  - "**/kubeconfig*"

  # Customer, card, payment, and regulated data samples
  - "data/**"
  - "fixtures/customer/**"
  - "fixtures/customers/**"
  - "fixtures/card/**"
  - "fixtures/cards/**"
  - "fixtures/payment/**"
  - "fixtures/payments/**"
  - "samples/customer/**"
  - "samples/customers/**"
  - "samples/card/**"
  - "samples/cards/**"
  - "samples/payment/**"
  - "samples/payments/**"

maxReadLines: 200
auditLog: "./audit.log"
